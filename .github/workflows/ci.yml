name: CI

on:
  pull_request:
    branches: [main]

jobs:
  web-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-client/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test

  auth-system:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-system
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 25
          cache: gradle
      - run: ./gradlew test
