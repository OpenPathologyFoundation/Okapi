spring:
  application:
    name: starling-auth-system
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:okapi_auth}
    username: ${POSTGRES_USER:okapi_service}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      client:
        registration:
          okta:
            client-id: ${OIDC_CLIENT_ID}
            client-secret: ${OIDC_CLIENT_SECRET}
            scope: openid,profile,email
        provider:
          okta:
            # Do NOT use `issuer-uri` here because it triggers OIDC discovery at app startup.
            # Using explicit endpoints allows `bootRun` to start even if Keycloak isn't running.
            # Defaults derive from okapi.oidc.issuer-uri (below) which always resolves.
            authorization-uri: ${OIDC_AUTHORIZATION_URI:${okapi.oidc.issuer-uri}/protocol/openid-connect/auth}
            token-uri: ${OIDC_TOKEN_URI:${okapi.oidc.issuer-uri}/protocol/openid-connect/token}
            user-info-uri: ${OIDC_USER_INFO_URI:${okapi.oidc.issuer-uri}/protocol/openid-connect/userinfo}
            jwk-set-uri: ${OIDC_JWK_SET_URI:${okapi.oidc.issuer-uri}/protocol/openid-connect/certs}

okapi:
  oidc:
    # Single source of truth for OIDC issuer. All derived URIs reference this property.
    # Override via OIDC_ISSUER_URI env var for production.
    issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8180/realms/okapi}
    provider-id: ${OIDC_PROVIDER_ID:${okapi.oidc.issuer-uri}}
    end-session-uri: ${OIDC_END_SESSION_URI:${okapi.oidc.issuer-uri}/protocol/openid-connect/logout}
  jwt:
    issuer: ${OKAPI_JWT_ISSUER:okapi}
    audience: ${OKAPI_JWT_AUDIENCE:okapi-tile-server}
    secret: ${OKAPI_JWT_SECRET}
    ttl-seconds: ${OKAPI_JWT_TTL_SECONDS:600}
  authz:
    version: ${OKAPI_AUTHZ_VERSION:2026.01.26+dev}
  device:
    trust:
      ttl-days: ${OKAPI_DEVICE_TRUST_TTL_DAYS:30}
  break-glass:
    ttl-hours: ${OKAPI_BREAK_GLASS_TTL_HOURS:24}
  research:
    grant:
      ttl-days: ${OKAPI_RESEARCH_GRANT_TTL_DAYS:90}
  viewer:
    # Comma-separated list of allowed origins for the viewer window.
    # Only needed when viewer is NOT behind the nginx reverse proxy.
    # Example: http://viewer.okapi.local,http://localhost:5174
    allowed-origins: ${OKAPI_VIEWER_ALLOWED_ORIGINS:}
#      saml2:
#        relying-party:
#          registration:
#            okapi-saml:
#              asserting-party:
#                metadata-uri: ${SAML_IDP_METADATA_URL}

server:
  port: ${SERVER_PORT:8080}
  # Trust X-Forwarded-* headers from the nginx reverse proxy so that
  # OIDC redirect URIs use the proxy's host:port (e.g. localhost:8443)
  # instead of the backend's host:port (localhost:8080).
  forward-headers-strategy: framework
