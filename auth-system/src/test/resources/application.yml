logging:
  level:
    root: INFO
    com.starling: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

spring:
  application:
    name: starling-auth-system-test
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      client:
        registration:
          okta:
            client-id: test-client-id
            client-secret: test-client-secret
            scope: openid,profile,email,groups
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          okta:
            authorization-uri: http://localhost:8080/test/authorize
            token-uri: http://localhost:8080/test/token
            user-info-uri: http://localhost:8080/test/userinfo
            jwk-set-uri: http://localhost:8080/test/jwks

starling:
  jwt:
    secret: test-secret-that-is-at-least-256-bits-long-for-hmac-sha256
  oidc:
    issuer-uri: http://localhost:8080/test
    provider-id: test-provider
    end-session-uri: http://localhost:8080/test/logout
