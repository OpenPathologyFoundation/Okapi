# Starling Development Reverse Proxy (formerly Okapi)
#
# Routes all services through a single origin to avoid CORS issues.
# Maps:
#   /tiles/        → FastAPI tile server (localhost:8000)
#   /viewer/       → Digital viewer dev server (localhost:5174)
#   /ws/           → Session awareness WebSocket service (localhost:8765)
#   /oauth2/       → Starling auth-system — Spring Security OIDC initiation
#   /login/oauth2/ → Starling auth-system — Spring Security OIDC callback
#   /logout        → Starling auth-system — Spring Security logout
#   /auth/         → Starling auth-system — auth API (localhost:8080)
#   /api/          → Starling auth-system — business API (localhost:8080)
#   /admin/        → Starling auth-system — admin API (localhost:8080)
#   /              → Starling web-client dev server (localhost:5173)
#
# IMPORTANT: Vite dev servers must be started with --host so they bind to
# 0.0.0.0 instead of localhost. Otherwise this nginx container cannot reach
# them via host.docker.internal.
#
#   cd web-client && npm run dev -- --host
#   cd digital-viewer && VITE_BASE=/viewer/ npm run dev -- --port 5174 --host
#
# Usage (--sysctl disables IPv6 to prevent intermittent upstream failures):
#   docker run --rm -p 8443:8443 \
#     --add-host=host.docker.internal:host-gateway \
#     --sysctl net.ipv6.conf.all.disable_ipv6=1 \
#     -v $(pwd)/proxy/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro \
#     nginx:alpine

upstream starling_backend {
    server host.docker.internal:8080;
}

upstream web_client {
    server host.docker.internal:5173;
}

upstream tile_server {
    server host.docker.internal:8000;
    keepalive 16;  # Reuse connections to single-worker uvicorn
}

upstream viewer_app {
    server host.docker.internal:5174;
}

upstream session_service {
    server host.docker.internal:8765;
}

server {
    listen 8443;
    server_name localhost;

    # Increase timeouts for large WSI tile requests
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_connect_timeout 10s;

    # Tile server — strip /tiles/ prefix and forward to FastAPI
    location /tiles/ {
        proxy_pass http://tile_server/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keepalive: reuse upstream connections (requires HTTP/1.1 + cleared Connection header)
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Buffer tile responses (small JPEGs ~20-80KB) so the uvicorn worker
        # is freed quickly even if the client reads slowly
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 128k;
    }

    # Viewer app — pass-through /viewer/ prefix to Vite dev server.
    # The digital-viewer must be started with VITE_BASE=/viewer/ so Vite
    # serves all assets under /viewer/... (including /@vite/client, etc).
    location /viewer/ {
        proxy_pass http://viewer_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Vite HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Session awareness WebSocket service
    # Exact match for /ws (client connects to ws://host:port/ws)
    location = /ws {
        proxy_pass http://session_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    location /ws/ {
        proxy_pass http://session_service/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Spring Security OIDC login/logout flows
    # These paths are handled by Spring Security (not SvelteKit) and must be
    # routed to the backend. The web-client's Vite config has matching proxy
    # rules for direct dev-server access (see web-client/vite.config.ts).
    location /oauth2/ {
        proxy_pass http://starling_backend/oauth2/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /login/oauth2/ {
        proxy_pass http://starling_backend/login/oauth2/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /logout {
        proxy_pass http://starling_backend/logout;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # Starling Spring Boot backend API
    # X-Forwarded-Host and X-Forwarded-Port are required so Spring Boot
    # constructs OIDC redirect URIs using the proxy's address (localhost:8443)
    # instead of the backend's address (host.docker.internal:8080).
    location /auth/ {
        proxy_pass http://starling_backend/auth/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /api/ {
        proxy_pass http://starling_backend/api/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /admin/ {
        proxy_pass http://starling_backend/admin/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # Default — SvelteKit web-client
    location / {
        proxy_pass http://web_client/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Vite HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
